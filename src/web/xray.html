<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disk X-Ray</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#06060a;color:#e0e0e0;font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

  .header{padding:20px 28px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,.04)}
  .logo{font-size:22px;font-weight:300;letter-spacing:6px;color:rgba(255,255,255,.4)}
  .logo b{color:rgba(255,200,100,.7);font-weight:400}
  .scan-bar{flex:1;display:flex;gap:8px;max-width:600px}
  .scan-input{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:#e0e0e0;font-size:13px;padding:10px 16px;border-radius:10px;font-family:inherit;outline:none;transition:border-color .2s}
  .scan-input:focus{border-color:rgba(255,200,100,.3)}
  .scan-btn{background:rgba(255,200,100,.08);border:1px solid rgba(255,200,100,.2);color:rgba(255,200,100,.7);font-size:12px;letter-spacing:2px;padding:10px 24px;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .2s;text-transform:uppercase}
  .scan-btn:hover{background:rgba(255,200,100,.15);color:rgba(255,200,100,.9)}
  .scan-btn:disabled{opacity:.3;cursor:not-allowed}

  .loading{display:none;text-align:center;padding:80px 20px;color:rgba(255,200,100,.4);font-size:14px;letter-spacing:2px}
  .loading.show{display:block}
  .loading .spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(255,200,100,.1);border-top-color:rgba(255,200,100,.5);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .results{display:none;padding:28px 36px;max-width:1200px;margin:0 auto}
  .results.show{display:block}
  @media(max-width:600px){.results{padding:16px}}

  /* KPI Cards */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:500px){.kpis{grid-template-columns:1fr}}
  .kpi{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:24px;text-align:center}
  .kpi-val{font-size:32px;font-weight:700;color:rgba(255,200,100,.8);font-variant-numeric:tabular-nums;line-height:1.1}
  .kpi-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase;margin-top:8px}
  .kpi-green .kpi-val{color:rgba(100,255,150,.8)}
  .kpi-red .kpi-val{color:rgba(255,120,120,.8)}

  /* Savings banner */
  .savings-banner{background:linear-gradient(135deg,rgba(255,200,100,.05) 0%,rgba(100,255,150,.03) 100%);border:1px solid rgba(255,200,100,.12);border-radius:20px;padding:36px 24px;text-align:center;margin-bottom:32px}
  .savings-big{font-size:56px;font-weight:700;color:rgba(255,200,100,.85);line-height:1}
  .savings-sub{font-size:14px;color:rgba(255,255,255,.3);margin-top:8px;font-weight:300}
  .savings-action{margin-top:18px;display:inline-block;background:rgba(255,200,100,.1);border:1px solid rgba(255,200,100,.25);color:rgba(255,200,100,.8);font-size:12px;letter-spacing:3px;padding:12px 32px;border-radius:30px;cursor:pointer;font-family:inherit;text-decoration:none;text-transform:uppercase;transition:all .2s;font-weight:500}
  .savings-action:hover{background:rgba(255,200,100,.2);transform:translateY(-1px)}

  /* Sections */
  .section{margin-bottom:36px}
  .section-title{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.15);text-transform:uppercase;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.04);font-weight:500}

  /* Treemap */
  .treemap{display:flex;flex-wrap:wrap;gap:4px;min-height:280px;padding:8px;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.03);border-radius:14px}
  .tree-cell{border-radius:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:10px 8px;overflow:hidden;cursor:default;transition:all .2s;min-width:60px;min-height:60px}
  .tree-cell:hover{transform:scale(1.03);z-index:1}
  .tree-name{font-size:10px;font-weight:500;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
  .tree-size{font-size:9px;color:rgba(255,255,255,.45);margin-top:2px}

  /* Tables */
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{text-align:left;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05)}
  .tbl td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.02);color:rgba(255,255,255,.4)}
  .tbl tr:hover td{color:rgba(255,255,255,.7);background:rgba(255,255,255,.01)}
  .tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:500}

  /* Dupe cards */
  .dupe-card{background:rgba(255,100,100,.02);border:1px solid rgba(255,100,100,.1);border-radius:12px;padding:16px 20px;margin-bottom:10px;transition:border-color .2s}
  .dupe-card:hover{border-color:rgba(255,100,100,.2)}
  .dupe-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .dupe-waste{font-size:15px;font-weight:700;color:rgba(255,120,120,.7)}
  .dupe-count{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px}
  .dupe-files{font-size:11px;color:rgba(255,255,255,.25);line-height:1.7;word-break:break-all}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:32px}
  @media(max-width:900px){.grid-2{grid-template-columns:1fr}}

  /* Type bar chart */
  .type-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .type-ext{font-size:12px;color:rgba(255,255,255,.4);min-width:70px;text-align:right;font-weight:500}
  .type-bar{flex:1;height:22px;background:rgba(255,255,255,.02);border-radius:6px;overflow:hidden;position:relative}
  .type-fill{height:100%;border-radius:6px;transition:width .6s ease}
  .type-meta{font-size:10px;color:rgba(255,255,255,.2);min-width:100px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><b>X</b>-RAY</div>
  <div class="scan-bar">
    <input class="scan-input" id="dirInput" placeholder="directory path to scan (e.g. ~/Documents)" value="">
    <button class="scan-btn" id="scanBtn" onclick="doScan()">SCAN</button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>scanning directory...</div>
</div>

<div class="results" id="results">
  <!-- KPI cards -->
  <div class="kpis" id="kpis"></div>

  <!-- Savings banner -->
  <div class="savings-banner" id="savingsBanner">
    <div class="savings-big" id="savingsVal">-</div>
    <div class="savings-sub" id="savingsSub">estimated savings with vault</div>
    <a class="savings-action" href="/">open vault &rarr;</a>
  </div>

  <!-- Treemap -->
  <div class="section">
    <div class="section-title">space usage by directory</div>
    <div class="treemap" id="treemap"></div>
  </div>

  <div class="grid-2">
    <!-- File type breakdown -->
    <div class="section">
      <div class="section-title">file types</div>
      <div id="typeChart"></div>
    </div>

    <!-- Largest files -->
    <div class="section">
      <div class="section-title">largest files</div>
      <table class="tbl" id="largestTable">
        <thead><tr><th>file</th><th class="num">size</th></tr></thead>
        <tbody id="largestBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Duplicates -->
  <div class="section">
    <div class="section-title" id="dupeTitle">duplicates</div>
    <div id="dupeList"></div>
  </div>
</div>

<script>
function fmtB(b) {
  if (!b || isNaN(b)) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

const COLORS = [
  '#ff6b6b','#ffa36b','#ffd56b','#a8e06b','#6be0a8','#6bcaff',
  '#6b8fff','#a06bff','#e06bff','#ff6bca','#ff8fa0','#ffc078',
  '#e8d44d','#7ae07a','#5cc5c5','#7aa3e0','#a07ae0','#d47ae0',
];

async function doScan() {
  const dir = document.getElementById('dirInput').value.trim();
  if (!dir) { document.getElementById('dirInput').focus(); return; }

  document.getElementById('loading').classList.add('show');
  document.getElementById('results').classList.remove('show');
  document.getElementById('scanBtn').disabled = true;

  try {
    const res = await fetch('/api/scan?dir=' + encodeURIComponent(dir));
    const data = await res.json();
    if (data.error) { alert('Scan error: ' + data.error); return; }
    renderResults(data);
  } catch(e) {
    alert('Scan failed: ' + e.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('scanBtn').disabled = false;
  }
}

function renderResults(d) {
  document.getElementById('results').classList.add('show');

  // KPIs
  const kpis = document.getElementById('kpis');
  kpis.innerHTML = `
    <div class="kpi"><div class="kpi-val">${d.totalFiles.toLocaleString()}</div><div class="kpi-label">files scanned</div></div>
    <div class="kpi"><div class="kpi-val">${fmtB(d.totalSize)}</div><div class="kpi-label">total size</div></div>
    <div class="kpi kpi-red"><div class="kpi-val">${fmtB(d.duplicates.wastedBytes)}</div><div class="kpi-label">wasted on duplicates</div></div>
    <div class="kpi"><div class="kpi-val">${d.duplicates.groups}</div><div class="kpi-label">duplicate groups</div></div>
    <div class="kpi kpi-green"><div class="kpi-val">${d.vaultEstimate.estimatedRatio}:1</div><div class="kpi-label">estimated vault ratio</div></div>
    <div class="kpi"><div class="kpi-val">${d.scanTime.toLocaleString()}ms</div><div class="kpi-label">scan time</div></div>
  `;

  // Savings banner
  document.getElementById('savingsVal').textContent = d.vaultEstimate.savingsPct + '% saved';
  document.getElementById('savingsSub').textContent =
    fmtB(d.totalSize) + ' → ' + fmtB(d.vaultEstimate.estimatedVaultSize) +
    ' (save ' + fmtB(d.vaultEstimate.estimatedSavings) + ')';

  // Treemap — proportional sized cells
  const treemap = document.getElementById('treemap');
  treemap.innerHTML = '';
  const topDirs = d.dirTree.slice(0, 25).filter(dir => (dir.size / d.totalSize) * 100 >= 0.3);

  topDirs.forEach((dir, i) => {
    const pct = (dir.size / d.totalSize) * 100;
    const cell = document.createElement('div');
    cell.className = 'tree-cell';
    // Scale: sqrt of percentage for area, with generous minimums
    const area = Math.max(80, Math.sqrt(pct) * 70);
    cell.style.width = area + 'px';
    cell.style.height = area + 'px';
    cell.style.background = COLORS[i % COLORS.length] + '18';
    cell.style.border = '1px solid ' + COLORS[i % COLORS.length] + '35';

    const dirName = dir.dir === '.' ? '(root)' : dir.dir.split('/').pop();
    const fullPath = dir.dir === '.' ? '(root files)' : dir.dir;
    cell.title = fullPath + '\n' + fmtB(dir.size) + ' (' + dir.pct + '%)';

    cell.innerHTML =
      '<div class="tree-name">' + esc(dirName) + '</div>' +
      '<div class="tree-size">' + fmtB(dir.size) + '</div>' +
      '<div class="tree-size" style="opacity:.5">' + dir.pct + '%</div>';
    treemap.appendChild(cell);
  });

  // File type chart
  const typeChart = document.getElementById('typeChart');
  typeChart.innerHTML = '';
  const maxType = d.typeBreakdown.length ? d.typeBreakdown[0].totalSize : 1;
  d.typeBreakdown.slice(0, 15).forEach((t, i) => {
    const pct = (t.totalSize / maxType) * 100;
    const row = document.createElement('div');
    row.className = 'type-row';
    row.innerHTML =
      '<div class="type-ext">' + esc(t.ext) + '</div>' +
      '<div class="type-bar"><div class="type-fill" style="width:' + pct + '%;background:' + COLORS[i % COLORS.length] + '80"></div></div>' +
      '<div class="type-meta">' + fmtB(t.totalSize) + ' / ' + t.count + '</div>';
    typeChart.appendChild(row);
  });

  // Largest files
  const tbody = document.getElementById('largestBody');
  tbody.innerHTML = '';
  d.largest.slice(0, 20).forEach(f => {
    const tr = document.createElement('tr');
    const name = f.path.length > 60 ? '...' + f.path.slice(-57) : f.path;
    tr.innerHTML = '<td title="' + esc(f.path) + '">' + esc(name) + '</td><td class="num">' + fmtB(f.size) + '</td>';
    tbody.appendChild(tr);
  });

  // Duplicates
  const dupeTitle = document.getElementById('dupeTitle');
  dupeTitle.textContent = 'duplicates (' + d.duplicates.groups + ' groups, ' + fmtB(d.duplicates.wastedBytes) + ' wasted)';
  const dupeList = document.getElementById('dupeList');
  dupeList.innerHTML = '';
  if (!d.duplicates.details.length) {
    dupeList.innerHTML = '<div style="color:rgba(100,255,150,.3);font-size:11px;padding:20px;text-align:center">No duplicates found. Clean!</div>';
  } else {
    d.duplicates.details.slice(0, 20).forEach(dup => {
      const card = document.createElement('div');
      card.className = 'dupe-card';
      card.innerHTML =
        '<div class="dupe-header"><div class="dupe-waste">wasting ' + fmtB(dup.waste) + '</div><div class="dupe-count">' + dup.count + ' copies of ' + fmtB(dup.size) + ' file</div></div>' +
        '<div class="dupe-files">' + dup.files.map(f => esc(f)).join('<br>') + '</div>';
      dupeList.appendChild(card);
    });
  }
}

// Auto-fill with home directory hint
document.getElementById('dirInput').value = '';
document.getElementById('dirInput').placeholder = 'enter a folder path (e.g. /Users/' + 'you/Documents)';

// Enter key triggers scan
document.getElementById('dirInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doScan();
});
</script>
</body>
</html>
