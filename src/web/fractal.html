<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal GPU</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw}
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair}

  /* Intro */
  #intro{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 1.2s ease}
  #intro.hide{opacity:0;pointer-events:none}
  #intro h1{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,8vw,80px);font-weight:300;letter-spacing:12px;text-transform:lowercase;color:rgba(255,255,255,.7);margin-bottom:8px}
  .sub{font-size:13px;font-weight:300;color:rgba(255,255,255,.12);letter-spacing:3px;max-width:400px;line-height:1.9}
  .sub2{font-size:11px;color:rgba(255,255,255,.05);letter-spacing:2px;max-width:380px;line-height:1.7;margin:6px 0 28px;font-style:italic;font-family:'Cormorant Garamond',serif}
  #intro button{background:none;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:8px;padding:14px 52px;border-radius:60px;cursor:pointer;transition:all .5s}
  #intro button:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.7);box-shadow:0 0 60px rgba(255,255,255,.03)}

  /* HUD */
  .hud{position:fixed;z-index:10;display:none;pointer-events:none}
  .hud *{pointer-events:auto}
  #topL{top:16px;left:20px}
  .htitle{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:rgba(255,255,255,.06);letter-spacing:6px}
  .hcoord{font-size:8px;color:rgba(255,255,255,.06);letter-spacing:1px;margin-top:3px;font-family:monospace;font-variant-numeric:tabular-nums}
  .hfps{font-size:8px;color:rgba(255,200,100,.15);letter-spacing:1px;margin-top:2px;font-family:monospace}

  #topR{top:16px;right:20px;display:none;flex-direction:column;gap:6px;align-items:flex-end}
  .cr{display:flex;align-items:center;gap:8px}
  .cl{font-size:8px;color:rgba(255,255,255,.1);letter-spacing:2px;text-transform:uppercase;min-width:50px;text-align:right}
  .cs{-webkit-appearance:none;appearance:none;width:120px;height:2px;background:rgba(255,255,255,.05);border-radius:2px;outline:none}
  .cs::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:background .2s}
  .cs::-webkit-slider-thumb:hover{background:rgba(255,200,100,.5)}
  .cv{font-size:8px;color:rgba(255,255,255,.08);min-width:32px;font-variant-numeric:tabular-nums;font-family:monospace}

  .cb{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.2);font-size:8px;letter-spacing:2px;padding:6px 14px;border-radius:16px;cursor:pointer;transition:all .3s;text-transform:uppercase;font-family:'Inter',sans-serif}
  .cb:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
  .cb.on{border-color:rgba(255,200,100,.2);color:rgba(255,200,100,.4);background:rgba(255,200,100,.03)}

  #bot{bottom:16px;left:50%;transform:translateX(-50%);display:none;gap:6px;flex-wrap:wrap;justify-content:center}
  .bb{background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.15);font-size:9px;letter-spacing:2px;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .3s;text-transform:lowercase;font-family:'Inter',sans-serif}
  .bb:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.35)}
  .bb.on{border-color:rgba(255,200,100,.2);color:rgba(255,200,100,.4);background:rgba(255,200,100,.02)}

  #modeBar{bottom:50px;left:50%;transform:translateX(-50%);display:none;gap:6px}

  .hint{position:fixed;bottom:16px;left:20px;font-size:8px;color:rgba(255,255,255,.04);letter-spacing:2px;z-index:10;display:none}
</style>
</head>
<body>

<div id="intro">
  <h1>vault</h1>
  <div class="sub">your data lives in the math<br>free &middot; encrypted &middot; deduplicated</div>
  <div class="sub2">"Bottomless wonders spring from simple rules repeated without end."</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button onclick="location.href='/'" style="border-color:rgba(255,200,100,.15);color:rgba(255,200,100,.5)">open vault</button>
    <button onclick="start()">explore fractal</button>
  </div>
</div>

<canvas id="gl"></canvas>

<div class="hud" id="topL">
  <div class="htitle">fractal</div>
  <div class="hcoord" id="coordL"></div>
  <div class="hfps" id="fpsL"></div>
</div>

<div class="hud" id="topR">
  <div class="cr"><span class="cl">iters</span><input class="cs" type="range" min="64" max="4096" value="256" id="iterS"><span class="cv" id="iterV">256</span></div>
  <div class="cr"><span class="cl">color</span><input class="cs" type="range" min="0" max="100" value="0" id="hueS"><span class="cv" id="hueV">0</span></div>
  <div class="cr"><span class="cl">glow</span><input class="cs" type="range" min="0" max="100" value="30" id="glowS"><span class="cv" id="glowV">30</span></div>
  <div class="cr"><span class="cl">speed</span><input class="cs" type="range" min="0" max="100" value="0" id="speedS"><span class="cv" id="speedV">0</span></div>
  <div class="cr" style="gap:6px;flex-wrap:wrap;justify-content:flex-end;margin-top:4px">
    <button class="cb" onclick="resetView()">reset</button>
    <button class="cb" id="jBtn" onclick="toggleJulia()">julia</button>
    <button class="cb" id="trapBtn" onclick="cycleColoring()">coloring</button>
    <button class="cb" id="3dBtn" onclick="toggle3D()">3d</button>
    <button class="cb" onclick="saveImage()">save</button>
  </div>
</div>

<div class="hud" id="bot"></div>
<div class="hud" id="modeBar"></div>
<div class="hint" id="hint">click zoom &middot; right-click out &middot; drag pan &middot; scroll zoom &middot; 1-9 palettes</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// FRACTAL GPU — WebGL2 Mandelbrot/Julia with orbit traps & 3D
// ═══════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', { antialias: false, preserveDrawingBuffer: true });
if (!gl) { alert('WebGL2 required'); }

// ─── STATE ────────────────────────────────────────────────────────────
let W, H;
let cx = -0.5, cy = 0.0;     // complex center
let zoom = 1.0;               // units visible (radius)
let maxIter = 256;
let hueShift = 0;
let glowAmount = 0.3;
let colorSpeed = 0;           // animated color cycling
let juliaMode = false;
let juliaCr = -0.7269, juliaCi = 0.1889;
let coloringMode = 0;         // 0=smooth, 1=orbit trap circle, 2=orbit trap cross, 3=orbit trap point, 4=distance est
const COLORING_NAMES = ['smooth', 'orbit ring', 'orbit cross', 'orbit point', 'distance', 'stripe', 'angle'];
let mode3D = false;
let started = false;
let needsRender = true;

// Interaction
let mDown = false, dragged = false, mBtn = 0;
let dsx, dsy, dcx, dcy;

// FPS
let frameCount = 0, lastFpsTime = 0, fps = 0;

// Animation
let animating = false, animSx, animSy, animSz, animTx, animTy, animTz, animT0;
const ANIM_DUR = 400;

// ─── PALETTES ─────────────────────────────────────────────────────────
const PALETTES = [
  // 0: Electric
  [[0,.0,.0],[.1,.0,.3],[.2,.1,.6],[.4,.2,.8],[.6,.4,.9],[.8,.6,.7],[1,.8,.5],[1,1,.3]],
  // 1: Fire
  [[0,0,0],[.2,0,0],[.5,.05,0],[.8,.15,0],[1,.4,0],[1,.65,.1],[1,.85,.4],[1,1,.7]],
  // 2: Ocean
  [[0,.02,.05],[0,.05,.15],[0,.1,.3],[.05,.2,.5],[.1,.35,.65],[.2,.55,.75],[.4,.75,.85],[.7,.9,.95]],
  // 3: Monochrome
  [[0,0,0],[.12,.12,.13],[.25,.25,.27],[.4,.4,.42],[.55,.55,.58],[.7,.7,.73],[.85,.85,.87],[1,1,1]],
  // 4: Neon
  [[0,0,.05],[.1,0,.2],[.3,0,.5],[.1,.2,.8],[0,.5,.7],[.1,.8,.4],[.5,1,.2],[1,1,.5]],
  // 5: Twilight
  [[0,.02,.06],[.08,.02,.18],[.2,.04,.35],[.4,.06,.45],[.6,.15,.5],[.75,.3,.45],[.85,.5,.4],[.95,.75,.5]],
  // 6: Emerald
  [[0,.02,0],[0,.08,.02],[.02,.2,.06],[.05,.35,.12],[.1,.5,.2],[.2,.65,.3],[.4,.8,.45],[.7,.95,.6]],
  // 7: Plasma
  [[.05,0,.1],[.15,0,.3],[.3,0,.5],[.5,.05,.5],[.7,.1,.4],[.85,.2,.3],[.95,.4,.2],[1,.7,.3]],
  // 8: Ice
  [[.7,.8,.9],[.6,.75,.9],[.5,.7,.92],[.4,.6,.88],[.3,.5,.82],[.2,.4,.75],[.15,.3,.65],[.1,.2,.5]],
];
let curPalette = 0;

// ─── POI ──────────────────────────────────────────────────────────────
const POI = [
  {n:'overview', x:-0.5, y:0, z:1.5},
  {n:'seahorse valley', x:-0.7463, y:0.1102, z:0.006},
  {n:'elephant valley', x:0.2821, y:0.01, z:0.008},
  {n:'double spiral', x:0.37001085, y:-0.6714354, z:0.00005},
  {n:'mini brot', x:-1.7685, y:0.0018, z:0.0005},
  {n:'lightning', x:-0.170337, y:1.06506, z:0.002},
  {n:'jewel', x:-0.235125, y:0.827215, z:0.0003},
  {n:'spiral arms', x:-0.7746806, y:0.1374168, z:0.00002},
  {n:'antenna', x:-1.25066, y:0.02012, z:0.001},
  {n:'star field', x:-0.0452, y:0.9868, z:0.0004},
];

const JULIA_PRE = [
  {n:'dendrite', r:-0.7269, i:0.1889},
  {n:'galaxy', r:-0.8, i:0.156},
  {n:'dragon', r:-0.4, i:0.6},
  {n:'frost', r:0.355, i:0.355},
  {n:'rabbit', r:-0.123, i:0.745},
  {n:'star', r:-0.75, i:0},
  {n:'vortex', r:0.285, i:0.01},
  {n:'web', r:-0.038, i:0.9754},
];

// ═══════════════════════════════════════════════════════════════════════
// SHADERS
// ═══════════════════════════════════════════════════════════════════════

const VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0, 1); }`;

// Double-emulated precision helpers + fractal core
const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2 u_res;
uniform vec2 u_center;
uniform float u_zoom;
uniform int u_maxIter;
uniform float u_hue;
uniform float u_glow;
uniform float u_time;
uniform float u_colorSpeed;
uniform int u_julia;
uniform vec2 u_juliaC;
uniform int u_coloring;   // 0=smooth, 1=orbit ring, 2=cross, 3=point, 4=distance, 5=stripe, 6=angle
uniform int u_3d;
uniform vec3 u_pal[8];

// ─── Palette interpolation ────────────────────────────────────────
vec3 palette(float t) {
  t = fract(t);
  float idx = t * 7.0;
  int i = int(idx);
  float f = fract(idx);
  f = f * f * (3.0 - 2.0 * f); // smoothstep
  vec3 a = u_pal[min(i, 7)];
  vec3 b = u_pal[min(i + 1, 7)];
  return mix(a, b, f);
}

// ─── Fractal computation ──────────────────────────────────────────
void main() {
  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);
  float cr, ci, zr, zi;

  if (u_julia == 1) {
    zr = uv.x * u_zoom + u_center.x;
    zi = uv.y * u_zoom + u_center.y;
    cr = u_juliaC.x;
    ci = u_juliaC.y;
  } else {
    cr = uv.x * u_zoom + u_center.x;
    ci = uv.y * u_zoom + u_center.y;
    zr = 0.0; zi = 0.0;
  }

  // 3D offset for height sampling
  if (u_3d == 1) {
    float dx = (1.0 / u_res.x) * u_zoom;
    cr += uv.x * 0.0001;
  }

  float zr2 = zr*zr, zi2 = zi*zi;
  int iter = 0;

  // Orbit trap variables
  float trapDist = 1e10;
  float stripSum = 0.0;
  float dzr = 1.0, dzi = 0.0; // derivative for distance estimation

  // Cardioid + bulb skip (Mandelbrot only)
  if (u_julia == 0) {
    float dx = cr - 0.25;
    float cy2 = ci * ci;
    float q = dx*dx + cy2;
    if (q*(q+dx) <= 0.25*cy2) {
      fragColor = vec4(0,0,0,1); return;
    }
    float dx2 = cr + 1.0;
    if (dx2*dx2 + cy2 <= 0.0625) {
      fragColor = vec4(0,0,0,1); return;
    }
  }

  for (int i = 0; i < 4096; i++) {
    if (i >= u_maxIter) break;
    if (zr2 + zi2 > 256.0) break;

    // Derivative for distance estimation
    if (u_coloring == 4) {
      float newDzr = 2.0*(zr*dzr - zi*dzi) + 1.0;
      float newDzi = 2.0*(zr*dzi + zi*dzr);
      dzr = newDzr; dzi = newDzi;
    }

    // Orbit traps
    if (u_coloring == 1) {
      // Circle trap at origin, radius 0.5
      float d = abs(sqrt(zr2 + zi2) - 0.5);
      trapDist = min(trapDist, d);
    } else if (u_coloring == 2) {
      // Cross trap (distance to axes)
      float d = min(abs(zr), abs(zi));
      trapDist = min(trapDist, d);
    } else if (u_coloring == 3) {
      // Point traps
      float d1 = (zr-1.0)*(zr-1.0) + zi*zi;
      float d2 = (zr+1.0)*(zr+1.0) + zi*zi;
      float d3 = zr*zr + (zi-1.0)*(zi-1.0);
      trapDist = min(trapDist, min(d1, min(d2, d3)));
    } else if (u_coloring == 5) {
      // Stripe average
      stripSum += 0.5 * sin(atan(zi, zr) * 2.0) + 0.5;
    }

    // z = z^2 + c
    float newZr = zr2 - zi2 + cr;
    zi = 2.0*zr*zi + ci;
    zr = newZr;
    zr2 = zr*zr;
    zi2 = zi*zi;
    iter++;
  }

  // ─── Coloring ─────────────────────────────────────────────────
  vec3 col;
  float timeShift = u_colorSpeed * u_time * 0.01;

  if (iter >= u_maxIter) {
    col = vec3(0.0);
  } else if (u_coloring == 0) {
    // Smooth iteration count
    float smooth_i = float(iter) + 1.0 - log2(log2(zr2 + zi2) * 0.5);
    float t = smooth_i * 0.02 + u_hue + timeShift;
    col = palette(t);
    // Glow: brighten based on how close to the set
    col += u_glow * 0.05 / (float(iter) * 0.1 + 1.0);
  } else if (u_coloring >= 1 && u_coloring <= 3) {
    // Orbit trap coloring
    float t;
    if (u_coloring == 3) {
      t = 1.0 - clamp(sqrt(trapDist) * 3.0, 0.0, 1.0);
    } else {
      t = 1.0 - clamp(trapDist * 4.0, 0.0, 1.0);
    }
    col = palette(t * 0.5 + u_hue + timeShift) * t;
    col += vec3(t*t*t) * 0.3 * u_glow;
  } else if (u_coloring == 4) {
    // Distance estimation
    float mag = sqrt(zr2 + zi2);
    float dmag = sqrt(dzr*dzr + dzi*dzi);
    float dist = 2.0 * mag * log(mag) / dmag;
    float d = clamp(dist / u_zoom * min(u_res.x, u_res.y) * 0.5, 0.0, 1.0);
    d = pow(d, 0.25);
    col = palette(d + u_hue + timeShift) * d;
    col += vec3(1.0 - d) * 0.02;
  } else if (u_coloring == 5) {
    // Stripe average
    float smooth_i = float(iter) + 1.0 - log2(log2(zr2 + zi2) * 0.5);
    float stripe = stripSum / smooth_i;
    float t = stripe * 2.0 + u_hue + timeShift;
    col = palette(t) * (0.5 + stripe * 0.5);
  } else if (u_coloring == 6) {
    // Angle coloring
    float angle = atan(zi, zr);
    float smooth_i = float(iter) + 1.0 - log2(log2(zr2 + zi2) * 0.5);
    float t = angle / 6.283 + smooth_i * 0.015 + u_hue + timeShift;
    col = palette(t);
  }

  // 3D lighting effect
  if (u_3d == 1 && iter < u_maxIter) {
    float smooth_i = float(iter) + 1.0 - log2(log2(zr2 + zi2) * 0.5);
    float height = smooth_i / float(u_maxIter);
    vec3 lightDir = normalize(vec3(-0.5, -0.5, 1.0));
    // Fake normal from iteration gradient
    float dx = dFdx(height);
    float dy = dFdy(height);
    vec3 normal = normalize(vec3(-dx * 80.0, -dy * 80.0, 1.0));
    float diffuse = max(dot(normal, lightDir), 0.0);
    float specular = pow(max(dot(reflect(-lightDir, normal), vec3(0,0,1)), 0.0), 16.0);
    col = col * (0.3 + 0.7 * diffuse) + vec3(specular * 0.4);
  }

  // Subtle vignette
  vec2 vigUv = gl_FragCoord.xy / u_res;
  float vig = 1.0 - dot((vigUv - 0.5) * 1.1, (vigUv - 0.5) * 1.1);
  col *= clamp(vig, 0.0, 1.0);

  fragColor = vec4(col, 1.0);
}`;

// ─── COMPILE SHADERS ──────────────────────────────────────────────────
function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compile(gl.VERTEX_SHADER, VS);
const fs = compile(gl.FRAGMENT_SHADER, FS);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

// Fullscreen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const U = {};
['u_res','u_center','u_zoom','u_maxIter','u_hue','u_glow','u_time','u_colorSpeed',
 'u_julia','u_juliaC','u_coloring','u_3d'].forEach(n => U[n] = gl.getUniformLocation(prog, n));
// Palette uniform (array of vec3)
const uPal = gl.getUniformLocation(prog, 'u_pal');

// ─── RESIZE ───────────────────────────────────────────────────────────
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.round(innerWidth * dpr);
  H = Math.round(innerHeight * dpr);
  canvas.width = W;
  canvas.height = H;
  gl.viewport(0, 0, W, H);
  needsRender = true;
}
addEventListener('resize', resize);
resize();

// ─── RENDER ───────────────────────────────────────────────────────────
function render(time) {
  gl.uniform2f(U.u_res, W, H);
  gl.uniform2f(U.u_center, cx, cy);
  gl.uniform1f(U.u_zoom, zoom * 2.0);
  gl.uniform1i(U.u_maxIter, maxIter);
  gl.uniform1f(U.u_hue, hueShift);
  gl.uniform1f(U.u_glow, glowAmount);
  gl.uniform1f(U.u_time, time * 0.001);
  gl.uniform1f(U.u_colorSpeed, colorSpeed);
  gl.uniform1i(U.u_julia, juliaMode ? 1 : 0);
  gl.uniform2f(U.u_juliaC, juliaCr, juliaCi);
  gl.uniform1i(U.u_coloring, coloringMode);
  gl.uniform1i(U.u_3d, mode3D ? 1 : 0);

  // Upload palette
  const pal = PALETTES[curPalette];
  const flat = new Float32Array(24);
  for (let i = 0; i < 8; i++) {
    flat[i*3] = pal[i][0];
    flat[i*3+1] = pal[i][1];
    flat[i*3+2] = pal[i][2];
  }
  gl.uniform3fv(uPal, flat);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ─── ANIMATION ────────────────────────────────────────────────────────
function animTo(tx, ty, tz) {
  animSx = cx; animSy = cy; animSz = zoom;
  animTx = tx; animTy = ty; animTz = tz;
  animT0 = performance.now();
  animating = true;
}

function tickAnim(now) {
  if (!animating) return;
  let t = (now - animT0) / ANIM_DUR;
  if (t >= 1) { t = 1; animating = false; }
  const e = t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2) / 2;
  cx = animSx + (animTx - animSx) * e;
  cy = animSy + (animTy - animSy) * e;
  zoom = Math.exp(Math.log(animSz) + (Math.log(animTz) - Math.log(animSz)) * e);
  autoIter();
}

function autoIter() {
  const d = 1.5 / zoom;
  let t = 256;
  if (d > 50) t = 512; if (d > 500) t = 768; if (d > 5e3) t = 1024;
  if (d > 5e4) t = 1500; if (d > 5e5) t = 2048; if (d > 5e6) t = 4096;
  if (t > maxIter) {
    maxIter = t;
    document.getElementById('iterS').value = t;
    document.getElementById('iterV').textContent = t;
  }
}

// ─── SCREEN → COMPLEX ─────────────────────────────────────────────────
function s2c(sx, sy) {
  const dpr = W / innerWidth;
  const mn = Math.min(W, H);
  return {
    r: cx + ((sx * dpr - W * 0.5) / mn) * zoom * 2.0,
    i: cy + ((sy * dpr - H * 0.5) / mn) * zoom * 2.0
  };
}

// ─── MOUSE ────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  mDown = true; mBtn = e.button; dragged = false;
  dsx = e.clientX; dsy = e.clientY; dcx = cx; dcy = cy;
});

canvas.addEventListener('mousemove', e => {
  if (mDown && mBtn === 0) {
    const dx = e.clientX - dsx, dy = e.clientY - dsy;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragged = true;
    const dpr = W / innerWidth;
    const mn = Math.min(W, H);
    cx = dcx - (dx * dpr / mn) * zoom * 2.0;
    cy = dcy - (dy * dpr / mn) * zoom * 2.0;
  }
  if (!juliaMode && started) {
    const c = s2c(e.clientX, e.clientY);
    juliaCr = c.r; juliaCi = c.i;
  }
});

canvas.addEventListener('mouseup', e => {
  if (mBtn === 0 && !dragged) {
    const c = s2c(e.clientX, e.clientY);
    animTo(c.r, c.i, zoom / 3);
  }
  mDown = false;
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  animTo(cx, cy, Math.min(zoom * 3, 2));
});

addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 1.15 : 1/1.15;
  const c = s2c(e.clientX, e.clientY);
  const nz = zoom * f;
  cx = c.r - (c.r - cx) * zoom / nz;
  cy = c.i - (c.i - cy) * zoom / nz;
  zoom = nz;
  autoIter();
}, {passive: false});

// ─── TOUCH ────────────────────────────────────────────────────────────
let tDist = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const a = e.touches[0], b = e.touches[1];
    tDist = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    dcx = cx; dcy = cy;
  } else {
    mDown = true; dragged = false;
    dsx = e.touches[0].clientX; dsy = e.touches[0].clientY;
    dcx = cx; dcy = cy;
  }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const a = e.touches[0], b = e.touches[1];
    const d = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    if (tDist > 0) { zoom *= tDist / d; autoIter(); }
    tDist = d;
  } else if (mDown) {
    const dx = e.touches[0].clientX - dsx, dy = e.touches[0].clientY - dsy;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragged = true;
    const dpr = W / innerWidth;
    const mn = Math.min(W, H);
    cx = dcx - (dx * dpr / mn) * zoom * 2.0;
    cy = dcy - (dy * dpr / mn) * zoom * 2.0;
  }
}, {passive: false});

canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1 && !e.touches.length && !dragged) {
    const t = e.changedTouches[0];
    const c = s2c(t.clientX, t.clientY);
    animTo(c.r, c.i, zoom / 2.5);
  }
  mDown = false; tDist = 0;
});

// ─── KEYBOARD ─────────────────────────────────────────────────────────
addEventListener('keydown', e => {
  if (!started) return;
  const k = e.key;
  if (k === 'r') resetView();
  else if (k === 'j') toggleJulia();
  else if (k === 'c') cycleColoring();
  else if (k === '3') toggle3D();
  else if (k === 's') saveImage();
  else if (k === '=' || k === '+') { maxIter = Math.min(4096, maxIter + 128); document.getElementById('iterS').value = maxIter; document.getElementById('iterV').textContent = maxIter; }
  else if (k === '-') { maxIter = Math.max(64, maxIter - 128); document.getElementById('iterS').value = maxIter; document.getElementById('iterV').textContent = maxIter; }
  else if (k >= '1' && k <= '9') {
    const i = parseInt(k) - 1;
    if (i < PALETTES.length) { curPalette = i; buildPalUI(); }
  }
});

// ─── CONTROLS ─────────────────────────────────────────────────────────
document.getElementById('iterS').addEventListener('input', e => {
  maxIter = parseInt(e.target.value);
  document.getElementById('iterV').textContent = maxIter;
});
document.getElementById('hueS').addEventListener('input', e => {
  hueShift = parseInt(e.target.value) / 100;
  document.getElementById('hueV').textContent = e.target.value;
});
document.getElementById('glowS').addEventListener('input', e => {
  glowAmount = parseInt(e.target.value) / 100;
  document.getElementById('glowV').textContent = e.target.value;
});
document.getElementById('speedS').addEventListener('input', e => {
  colorSpeed = parseInt(e.target.value) / 10;
  document.getElementById('speedV').textContent = e.target.value;
});

function resetView() {
  animTo(juliaMode ? 0 : -0.5, 0, 1.5);
  maxIter = 256;
  document.getElementById('iterS').value = 256;
  document.getElementById('iterV').textContent = '256';
}

function toggleJulia() {
  juliaMode = !juliaMode;
  document.getElementById('jBtn').classList.toggle('on', juliaMode);
  if (juliaMode) { cx = 0; cy = 0; zoom = 1.5; buildJuliaUI(); }
  else { cx = -0.5; cy = 0; zoom = 1.5; buildPOIui(); }
}

function cycleColoring() {
  coloringMode = (coloringMode + 1) % COLORING_NAMES.length;
  document.getElementById('trapBtn').textContent = COLORING_NAMES[coloringMode];
  document.getElementById('trapBtn').classList.toggle('on', coloringMode > 0);
}

function toggle3D() {
  mode3D = !mode3D;
  document.getElementById('3dBtn').classList.toggle('on', mode3D);
}

function saveImage() {
  render(performance.now());
  const a = document.createElement('a');
  a.download = 'fractal-' + Date.now() + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ─── BUILD UI ─────────────────────────────────────────────────────────
function buildPalUI() {
  const bar = document.getElementById('modeBar');
  bar.innerHTML = '';
  PALETTES.forEach((_, i) => {
    const b = document.createElement('div');
    b.className = 'bb' + (i === curPalette ? ' on' : '');
    b.textContent = (i + 1);
    b.style.minWidth = '28px'; b.style.textAlign = 'center';
    b.onclick = () => { curPalette = i; buildPalUI(); };
    bar.appendChild(b);
  });
}

function buildPOIui() {
  const r = document.getElementById('bot');
  r.innerHTML = '';
  POI.forEach(p => {
    const b = document.createElement('div');
    b.className = 'bb';
    b.textContent = p.n;
    b.onclick = () => { animTo(p.x, p.y, p.z); };
    r.appendChild(b);
  });
}

function buildJuliaUI() {
  const r = document.getElementById('bot');
  r.innerHTML = '';
  JULIA_PRE.forEach(p => {
    const b = document.createElement('div');
    b.className = 'bb';
    b.textContent = p.n;
    b.onclick = () => { juliaCr = p.r; juliaCi = p.i; cx = 0; cy = 0; zoom = 1.5; };
    r.appendChild(b);
  });
}

// ─── INFO ─────────────────────────────────────────────────────────────
function updateInfo() {
  const zl = 1.5 / zoom;
  let zs;
  if (zl >= 1e12) zs = zl.toExponential(1) + 'x';
  else if (zl >= 1e9) zs = (zl/1e9).toFixed(1) + 'Bx';
  else if (zl >= 1e6) zs = (zl/1e6).toFixed(1) + 'Mx';
  else if (zl >= 1e3) zs = (zl/1e3).toFixed(1) + 'Kx';
  else zs = zl.toFixed(1) + 'x';

  const sign = cy >= 0 ? '+' : '\u2212';
  document.getElementById('coordL').textContent =
    cx.toPrecision(10) + ' ' + sign + ' ' + Math.abs(cy).toPrecision(10) + 'i \u00B7 ' + zs + ' \u00B7 ' + maxIter + ' iter';
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────
function tick(now) {
  tickAnim(now);
  render(now);
  updateInfo();

  // FPS counter
  frameCount++;
  if (now - lastFpsTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fpsL').textContent = fps + ' fps \u00B7 ' + W + '\u00D7' + H + ' \u00B7 GPU';
  }

  requestAnimationFrame(tick);
}

// ─── START ────────────────────────────────────────────────────────────
function start() {
  started = true;
  document.getElementById('intro').classList.add('hide');
  setTimeout(() => { document.getElementById('intro').style.display = 'none'; }, 1200);
  document.getElementById('topL').style.display = 'block';
  document.getElementById('topR').style.display = 'flex';
  document.getElementById('bot').style.display = 'flex';
  document.getElementById('modeBar').style.display = 'flex';
  document.getElementById('hint').style.display = 'block';
  buildPalUI();
  buildPOIui();
}

// ─── URL HASH PARAMS (for fingerprint links) ─────────────────────────
// e.g. /fractal#cx=-0.74&cy=0.11&zoom=0.006&pal=2&col=1
function loadHashParams() {
  const hash = location.hash.slice(1);
  if (!hash) return false;
  const params = Object.fromEntries(hash.split('&').map(p => p.split('=')));
  if (params.cx) cx = parseFloat(params.cx);
  if (params.cy) cy = parseFloat(params.cy);
  if (params.zoom) zoom = parseFloat(params.zoom);
  if (params.pal) curPalette = parseInt(params.pal) % PALETTES.length;
  if (params.col) coloringMode = parseInt(params.col) % COLORING_NAMES.length;
  return !!params.cx;
}

// If opened with hash params (fingerprint link), auto-start
if (loadHashParams()) {
  start();
  document.getElementById('trapBtn').textContent = COLORING_NAMES[coloringMode];
  if (coloringMode > 0) document.getElementById('trapBtn').classList.add('on');
}

requestAnimationFrame(tick);
</script>
</body>
</html>
